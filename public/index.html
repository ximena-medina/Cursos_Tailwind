<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../public/css/tailwind.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>Platzi Travel</title>
</head>
<body>
    <nav></nav>
    <div id="tab_bar"></div>
    <section class="w-full h-screen">
        <div id="home">
            <div class="w-full h-3/4">
                <div class="w-full h-full flex flex-col absolute space-y-96 py-4 items-center">
                    <input class="outline-none p-3 rounded-full shadow-sm transition duration-300 focus-within:shadow-sm focus:ring-2 focus:w-11/12" placeholder="San Francisco" type="search" name="" id="">
                    <button class="w-32 rounded-full text-x1 text-primary shadow-sm font-semibold p-3 bg-white transition transition-all duration-500 ease-in-out hover:bg-primary hover:text-white hover:translate-y-1 hover:scale-110">
                        Explorar
                    </button>
                </div>
                <div class="w-full h-full">
                    <img src="./img/sanFrancisco.jpg" alt="">
                </div>
            </div>
        </div>
        <div class="p-6" id="recomendados"> 
            <p class="text-3xl font-semibold text-primary"> Recomendados </p>
            <div class="w-auto h-72 items-center mt-6 overflow-x-auto overscroll-x-contain flex space-x-4">
                <div class="Card">
                    <div class="w-full h-3/5 bg-norway bg-cover rounded-t-lg"></div>
                    <div class="w-full h-2/5 bg-secondary rounded-b-lg flex flex-col justify-center gap-2 p-4">
                        <p class="text-white font-bold text-x2">Noruega</p>
                        <p class="text-white font-medium">Paisajes hermosos</p>
                    </div>
                </div>
                <div class="Card">
                    <div class="w-full h-3/5 bg-new_york bg-cover rounded-t-lg"></div>
                    <div class="w-full h-2/5 bg-white rounded-b-lg flex flex-col justify-center gap-2 p-4">
                        <p class="text-tertiary font-bold text-x2">Nueva York</p>
                        <p class="text-tertiary font-medium">Ciudad extraordinaria</p>
                    </div>
                </div>
                <div class="Card">
                    <div class="w-full h-3/5 bg-yosemite bg-cover rounded-t-lg"></div>
                    <div class="w-full h-2/5 bg-secondary rounded-b-lg flex flex-col justify-center gap-2 p-4">
                        <p class="text-white font-bold text-x2">Yosemite</p>
                        <p class="text-white font-medium">Ciudad grande</p>
                    </div>
                </div>
                <div class="Card">
                    <div class="w-full h-3/5 bg-seattle bg-cover rounded-t-lg"></div>
                    <div class="w-full h-2/5 bg-white rounded-b-lg flex flex-col justify-center gap-2 p-4">
                        <p class="text-tertiary font-bold text-x2">Sede</p>
                        <p class="text-tertiary font-medium">Gradiosa Ciudad</p>
                    </div>
                </div>
                <div class="Card">
                    <div class="w-full h-3/5 bg-switzerland bg-cover rounded-t-lg"></div>
                    <div class="w-full h-2/5 bg-secondary rounded-b-lg flex flex-col justify-center gap-2 p-4">
                        <p class="text-white font-bold text-x2">Suiza</p>
                        <p class="text-white font-medium">Hermosos Paisajes</p>
                    </div>
                </div>
            </div>
        </div>
        <div id="rentas destacadas"></div>
    </section>
</body>
</html>
